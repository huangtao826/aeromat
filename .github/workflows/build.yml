name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller
        run: .\venv\Scripts\pyinstaller.exe --onedir --name AeromatAI --console app_launcher.py

      - name: Check build output
        run: |
          echo Build output:
          Get-ChildItem dist\AeromatAI | Select-Object Name, Length

      - name: Copy additional files
        run: |
          Copy-Item -Path app.py -Destination dist\AeromatAI\
          Copy-Item -Path start.bat -Destination dist\AeromatAI\

      - name: Create zip archive
        run: |
          Remove-Item -Path dist\AeromatAI-Windows.zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\AeromatAI -DestinationPath dist\AeromatAI-Windows.zip -Force

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip