name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller (include all dependencies)
        run: |
          .\venv\Scripts\pyinstaller.exe --onedir --name AeromatAI --console ^
            --add-data "app.py;." ^
            --add-data "knowledge;knowledge" ^
            --add-data "ui;ui" ^
            --add-data "config;config" ^
            --hidden-import streamlit ^
            --hidden-import plotly ^
            --hidden-import pandas ^
            --hidden-import requests ^
            --collect-all streamlit ^
            --collect-all plotly ^
            app_launcher.py

      - name: Verify exe exists
        run: |
          if (Test-Path "dist\AeromatAI\AeromatAI.exe") {
            Write-Host "[OK] AeromatAI.exe found"
            Write-Host "Size: $((Get-Item 'dist\AeromatAI\AeromatAI.exe').Length / 1MB) MB"
          } else {
            Write-Host "[ERROR] exe not found"
            Get-ChildItem dist -Recurse -Filter "*.exe"
          }

      - name: Create zip archive
        run: Compress-Archive -Path dist\AeromatAI -DestinationPath dist\AeromatAI-Windows.zip -Force

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip