name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment
        run: python -m venv venv

      - name: Activate virtual environment
        run: |
          .\venv\Scripts\Activate.ps1
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller
        run: |
          $ErrorActionPreference = 'Continue'
          .\venv\Scripts\pyinstaller.exe --onedir --name AeromatAI --console --hidden-import streamlit --hidden-import plotly --hidden-import pandas --hidden-import requests app_launcher.py

      - name: Create distribution folder
        run: |
          New-Item -ItemType Directory -Force -Path dist\AeromatAI | Out-Null
          Copy-Item -Path dist\AeromatAI\* -Destination dist\AeromatAI\ -Recurse -Force
          Copy-Item -Path app.py -Destination dist\AeromatAI\
          Copy-Item -Path start.bat -Destination dist\AeromatAI\
          Copy-Item -Path knowledge -Destination dist\AeromatAI\ -Recurse -Force
          Copy-Item -Path ui -Destination dist\AeromatAI\ -Recurse -Force
          Copy-Item -Path config -Destination dist\AeromatAI\ -Recurse -Force
          Copy-Item -Path agents -Destination dist\AeromatAI\ -Recurse -Force
          Copy-Item -Path core -Destination dist\AeromatAI\ -Recurse -Force

      - name: Create zip archive
        run: |
          Compress-Archive -Path dist\AeromatAI -DestinationPath dist\AeromatAI-Windows.zip -Force

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip