name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller
        run: .\venv\Scripts\pyinstaller.exe --onedir --name AeromatAI --console --hidden-import streamlit --hidden-import plotly --hidden-import pandas --hidden-import requests app_launcher.py

      - name: Prepare distribution
        shell: cmd
        run: |
          if exist dist\AeromatAI rmdir /s /q dist\AeromatAI
          mkdir dist\AeromatAI
          xcopy /E /I dist\AeromatAI.exe dist\AeromatAI
          copy app.py dist\AeromatAI\
          copy start.bat dist\AeromatAI\
          xcopy /E /I knowledge dist\AeromatAI\knowledge
          xcopy /E /I ui dist\AeromatAI\ui
          xcopy /E /I config dist\AeromatAI\config

      - name: Create zip archive
        shell: cmd
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path AeromatAI -DestinationPath AeromatAI-Windows.zip -Force"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip