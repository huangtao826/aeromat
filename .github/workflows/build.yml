name: Build Windows Distribution

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pandas plotly requests pyinstaller

      - name: Prepare distribution folder
        shell: cmd
        run: |
          if exist dist rmdir /s /q dist
          mkdir dist\AeromatAI

          :: 复制虚拟环境（排除缓存）
          xcopy /E /I /Y venv dist\AeromatAI\venv

          :: 复制应用文件
          copy app.py dist\AeromatAI\
          copy app_launcher.py dist\AeromatAI\
          copy start.bat dist\AeromatAI\

          :: 复制知识库和配置
          xcopy /E /I /Y knowledge dist\AeromatAI\knowledge
          xcopy /E /I /Y ui dist\AeromatAI\ui
          xcopy /E /I /Y config dist\AeromatAI\config

          :: 创建启动脚本
          echo @echo off > dist\AeromatAI\启动.bat
          echo cd /d "%%~dp0" >> dist\AeromatAI\启动.bat
          echo call venv\Scripts\activate.bat >> dist\AeromatAI\启动.bat
          echo python -m streamlit run app.py --server.port 8501 >> dist\AeromatAI\启动.bat

      - name: Create zip archive
        shell: cmd
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path AeromatAI -DestinationPath AeromatAI-Windows.zip -Force"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip