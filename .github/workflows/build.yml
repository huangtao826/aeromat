name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller
        run: .\venv\Scripts\pyinstaller.exe --onedir --name AeromatAI --console --hidden-import streamlit --hidden-import plotly --hidden-import pandas --hidden-import requests app_launcher.py

      - name: Prepare distribution
        run: |
          Remove-Item -Path dist\AeromatAI -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist\AeromatAI | Out-Null
          Get-ChildItem "dist\AeromatAI.exe" | Copy-Item -Destination "dist\AeromatAI\" -Recurse
          Copy-Item app.py start.bat -Destination dist\AeromatAI\
          Copy-Item knowledge ui config -Destination dist\AeromatAI\ -Recurse

      - name: Create zip archive
        run: Compress-Archive -Path dist\AeromatAI -DestinationPath dist\AeromatAI-Windows.zip -Force

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip