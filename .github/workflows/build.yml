name: Build Windows Distribution

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pandas plotly requests pyinstaller

      - name: Prepare distribution folder
        shell: cmd
        run: |
          if exist dist rmdir /s /q dist
          mkdir dist\AeromatAI
          mkdir dist\AeromatAI\venv
          mkdir dist\AeromatAI\knowledge
          mkdir dist\AeromatAI\ui
          mkdir dist\AeromatAI\config

          :: 复制虚拟环境内容
          xcopy /E /Y venv\Scripts dist\AeromatAI\venv\Scripts\
          xcopy /E /Y venv\Lib dist\AeromatAI\venv\Lib\
          copy venv\pyvenv.cfg dist\AeromatAI\venv\
          copy venv\*.txt dist\AeromatAI\venv\

          :: 复制应用文件
          copy app.py dist\AeromatAI\
          copy start.bat dist\AeromatAI\

          :: 复制知识库和配置
          xcopy /E /Y knowledge dist\AeromatAI\knowledge\
          xcopy /E /Y ui dist\AeromatAI\ui\
          xcopy /E /Y config dist\AeromatAI\config\

          :: 列出复制结果
          echo === 复制完成 ===
          dir dist\AeromatAI\ /B
          dir dist\AeromatAI\venv\ /B

      - name: Create zip archive
        shell: cmd
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path AeromatAI -DestinationPath AeromatAI-Windows.zip -Force"
          dir

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/AeromatAI-Windows.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip