name: Build Windows Executable

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          .\venv\Scripts\pip.exe install --upgrade pip
          .\venv\Scripts\pip.exe install streamlit pyinstaller pandas plotly requests

      - name: Build with PyInstaller
        run: |
          $pyinstaller = ".\venv\Scripts\pyinstaller.exe"
          $args = @(
            "--onedir",
            "--name", "AeromatAI",
            "--console",
            "--hidden-import", "streamlit",
            "--hidden-import", "plotly",
            "--hidden-import", "pandas",
            "--hidden-import", "requests",
            "--collect-all", "streamlit",
            "--collect-all", "plotly",
            "app_launcher.py"
          )
          & $pyinstaller $args

      - name: Verify exe
        run: |
          if (Test-Path "dist\AeromatAI\AeromatAI.exe") {
            Write-Host "[OK] Found"
            Write-Host "Size: $([math]::Round((Get-Item 'dist\AeromatAI\AeromatAI.exe').Length / 1MB, 2)) MB"
          }

      - name: Create zip
        run: Compress-Archive -Path dist\AeromatAI -DestinationPath dist\AeromatAI-Windows.zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AeromatAI-Windows
          path: dist/AeromatAI-Windows.zip